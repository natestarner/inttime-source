name: CI — Build, Test & Promote to Lower

on:
  push:
    branches: [main]

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: natestarner/inttime-backend
  DEPLOY_REPO: natestarner/inttime-deploy

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build and test the backend
  # ──────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn verify -B

      - name: Build JAR (skip tests — already ran)
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: Build and test the frontend
  # ──────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 3: Build and push Docker image
  # ──────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-ci]
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ──────────────────────────────────────────────
  # Job 4: Update the deploy repo (lower branch)
  # ──────────────────────────────────────────────
  promote-to-lower:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-build]

    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: natestarner/inttime-deploy
          ref: lower
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          path: deploy

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: deploy/frontend-build

      - name: Update image tag
        run: |
          echo "${{ needs.docker-build.outputs.short_sha }}" > deploy/manifests/image-tag.txt

      - name: Commit and push to deploy repo lower branch
        run: |
          cd deploy
          git config user.name "CI Bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy ${{ needs.docker-build.outputs.short_sha }} to lower

          Source commit: ${{ github.sha }}
          Source repo: ${{ github.repository }}
          Triggered by: ${{ github.actor }}"
          git push origin lower
